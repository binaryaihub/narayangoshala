# --- About Page ---
about_page:
  hero:
    label: "About Us"
    title: "Our Story"
    subtitle: "Born from a deep reverence for Gau Mata, Narayan Goshala stands as a sanctuary of hope, healing, and unconditional love for cows."
  mission:
    title: "Our Mission"
    text: "To rescue, shelter, and provide comprehensive care to abandoned, injured, and sick cows. We aim to create awareness about cow welfare and build a compassionate community dedicated to the protection of Gau Mata."
  vision:
    title: "Our Vision"
    text: "A world where no cow is abandoned or harmed. We envision a future where every cow is treated with respect and dignity, where communities come together to protect these gentle beings, and where Gau Seva is a way of life."
  values:
    label: "Core Values"
    title: "What Drives Us"
    items:
      - icon: "Heart"
        title: "Compassion"
        description: "Every living being deserves love and care. We treat each cow as a family member."
      - icon: "Users"
        title: "Community"
        description: "We build a community of like-minded people who believe in the cause of cow protection."
      - icon: "Award"
        title: "Transparency"
        description: "100% transparency in our operations. Every donation is accounted for and reported."
      - icon: "Calendar"
        title: "Commitment"
        description: "We are committed to providing lifelong care to every cow that enters our shelter."
  timeline:
    label: "Our Journey"
    title: "Timeline"
    events:
      - year: "2010"
        title: "Foundation"
        description: "Narayan Goshala was established with just 5 cows and a dream to protect every cow."
      - year: "2013"
        title: "First Expansion"
        description: "Expanded our shelter to accommodate 100+ cows with proper medical facilities."
      - year: "2016"
        title: "Medical Center"
        description: "Set up a fully equipped veterinary hospital within the goshala premises."
      - year: "2019"
        title: "Organic Initiative"
        description: "Launched our organic products line - ghee, milk, and panchagavya products."
      - year: "2022"
        title: "Community Growth"
        description: "Crossed 500+ cows in shelter with support from 1000+ regular donors."
      - year: "2024"
        title: "Digital Outreach"
        description: "Launched cow adoption program and online donation portal for global supporters."

