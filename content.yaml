# --- About Section (Homepage) ---
about_section:
  label: "About Us"
  title_line1: "A Home for Every"
  title_line2: "Sacred Cow"
  paragraph1: "Narayan Goshala was founded with a simple yet profound mission: to provide unconditional love, care, and protection to every cow that comes to us. In our tradition, the cow is revered as Gau Mata - a symbol of selfless giving."
  paragraph2: "We rescue abandoned, injured, and sick cows from the streets, provide them with medical treatment, nutritious food, and a safe shelter where they can live with dignity. Our dedicated team of veterinarians and caregivers works around the clock to ensure every cow receives the best possible care."
  stats:
    - number: "500+"
      label: "Cows Sheltered"
      icon: "Shield"
    - number: "10+"
      label: "Years of Service"
      icon: "Heart"
    - number: "50+"
      label: "Acres of Land"
      icon: "Leaf"
    - number: "1000+"
      label: "Donors & Volunteers"
      icon: "Users"

# --- Programs Section ---
programs:
  label: "What We Do"
  title: "Our Programs & Services"
  subtitle: "From rescue to rehabilitation, we provide comprehensive care to ensure every cow lives a healthy and peaceful life."
  items:
    - icon: "Heart"
      title: "Cow Rescue"
      description: "We rescue abandoned, injured, and sick cows from streets and bring them to our shelter for immediate care and rehabilitation."
      color: "from-red-500 to-rose-500"
    - icon: "Stethoscope"
      title: "Medical Care"
      description: "Our team of veterinarians provides round-the-clock medical treatment, regular health checkups, and emergency care."
      color: "from-blue-500 to-cyan-500"
    - icon: "HandHeart"
      title: "Cow Adoption"
      description: "Adopt a cow virtually and sponsor its food, shelter, and medical expenses. Receive regular updates about your adopted cow."
      color: "from-primary to-primary-light"
    - icon: "Milk"
      title: "Organic Products"
      description: "Pure and organic cow products including milk, ghee, gomutra, and gobar-based products prepared traditionally."
      color: "from-amber-500 to-yellow-500"
    - icon: "TreePine"
      title: "Go-Van (Pasture)"
      description: "Large green pastures and grazing grounds where cows roam freely, ensuring their natural lifestyle and happiness."
      color: "from-secondary to-secondary-light"
    - icon: "BookOpen"
      title: "Community Awareness"
      description: "Educational programs and workshops about cow welfare, importance of Gau Seva, and sustainable farming practices."
      color: "from-purple-500 to-violet-500"

